{% extends "base.html" %}

{% block title %}
New routine
{% endblock %}

{% block main %}
<div class="container separate title-region flex center-justify center-align">
  <h1 class="h1 no-margin">New routine</h1>
</div>

<div class="container">
  <form action="/" method="post">
    <div class="routine-editor">
      <div>
        <input class="special-input" autocomplete="off" name="routine-name" type="text" placeholder="Routine name">
      </div>
      <div class="line"></div>
      <div id="exercise-1" class="exercise">
        <div class="exercise-name flex center-align between-justify">
          <img class="exercise-image" src="/static/images/barbell_bench_press.png">
          <h3 class="h3 no-margin">Barbell Bench Press</h3>
          <button id="add-set" class="btn" type="button">Add set</button>
        </div>
        <div class="exercise-set flex gap center-align">
          <p class="text-center no-margin">1</p>
          <div class="input-wrapper flex gap center-align evenly-justify">
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Weight</label>
            </div>
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Reps</label>
            </div>
          </div>
        </div>
        <div class="exercise-set flex gap center-align">
          <p class="text-center no-margin">2</p>
          <div class="input-wrapper input-wrapper flex gap center-align evenly-justify">
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Weight</label>
            </div>
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Reps</label>
            </div>
          </div>
        </div>
      </div>
      <div class="exercise">
        <div class="exercise-name flex center-align between-justify">
          <img class="exercise-image" src="/static/images/barbell_bench_press.png">
          <h3 class="h3 no-margin">Barbell Bench Press</h3>
          <button class="btn">Add set</button>
        </div>
        <div class="exercise-set flex gap center-align">
          <p class="text-center no-margin">1</p>
          <div class="input-wrapper flex gap center-align evenly-justify">
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Weight</label>
            </div>
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Reps</label>
            </div>
          </div>
        </div>
        <div class="exercise-set flex gap center-align">
          <p class="text-center no-margin">2</p>
          <div class="input-wrapper input-wrapper flex gap center-align evenly-justify">
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Weight</label>
            </div>
            <div class="input-group">
              <input class="input" autocomplete="off" name="routine-name" type="text">
              <label for="name" class="input-label">Reps</label>
            </div>
          </div>
        </div>
      </div>
      <div class="flex gap center-justify">
        <button class="btn">Add exercise</button>
        <button class="btn" type="submit">Save routine</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
