{% extends "base.html" %}

{% block title %}
Sign Up
{% endblock %}

{% block main %}
<div class="displayer">
  <div class="division">
    <div class="division-side left flex column gap center-justify">
      <img class="logo" src="/static/images/fitzz.webp" alt="fitzz">
      <h2 class="h2 text-center">Create an account</h2>
      <form class="flex column" action="/signup" method="post">
        <div class="input-group">
          <input class="input" autocomplete="off" name="username" type="text">
          <label for="username" class="input-label">Username</label>
        </div>
        <div class="input-group">
          <input class="input" name="password" type="password">
          <label for="password" class="input-label">Password</label>
        </div>
        <div class="input-group">
          <input class="input" name="confirmation" type="password">
          <label for="confirmation" class="input-label">Confirm Password</label>
        </div>
        <button class="btn" type="submit">Sign Up</button>
      </form>
    </div>
    <div class="division-side right flex column gap center-justify">
      <h2 class="h2 text-center">Already have an account?</h2>
      <div class="flex column gap">
        <p class="text-center">Log in and jump back in!</p>
        <form class="flex column gap" action="/login">
          <button class="btn" type="submit">Log In</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
